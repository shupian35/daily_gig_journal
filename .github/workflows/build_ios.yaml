name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========== Android APK ==========
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Android APK
        run: flutter build apk --release

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ========== iOS IPA (无签名) ==========
  build-ios:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 iOS (无签名)
        run: flutter build ios --release --no-codesign

      - name: 打包 IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r 日程清单.ipa Payload/

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/日程清单.ipa

  # ========== 发布 Release ==========
  release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出产物
        run: find artifacts -type f

      - name: 创建/更新 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build - ${{ github.sha }}"
          body: |
            ## 自动构建

            - **提交:** ${{ github.sha }}
            - **时间:** ${{ github.event.head_commit.timestamp }}

            | 平台 | 文件 |
            |------|------|
            | Android | `app-release.apk` |
            | iOS | `日程清单.ipa`（无签名） |
          prerelease: true
          files: |
            artifacts/android-apk/app-release.apk
            artifacts/ios-ipa/日程清单.ipa
