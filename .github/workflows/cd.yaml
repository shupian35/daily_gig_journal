name: CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - run: flutter pub get

      - name: 构建 Android APK
        run: flutter build apk --release

      - name: 重命名 APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/日程清单.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/日程清单.apk
          retention-days: 30

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - run: flutter pub get

      - name: 构建 iOS (无签名)
        run: flutter build ios --release --no-codesign

      - name: 打包 IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r 日程清单.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/日程清单.ipa
          retention-days: 30

  release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建正式发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.version }}"
          make_latest: true
          body: |
            ## v${{ steps.version.outputs.version }}

            | 项目 | 值 |
            |------|-----|
            | **版本** | `${{ steps.version.outputs.version }}` |
            | **构建编号** | `#${{ github.run_number }}` |
            | **提交** | [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |

            ### 产物

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Android | `日程清单.apk` | 可直接安装 |
            | iOS | `日程清单.ipa` | 未签名，需通过 AltStore / Sideloadly 等工具签名后安装 |
          files: |
            artifacts/android-apk/日程清单.apk
            artifacts/ios-ipa/日程清单.ipa
