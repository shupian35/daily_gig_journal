name: daily_gig_journal
description: "日程清单 - 帮助日结兼职人员记录工作安排、笔记和工资统计"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # 状态管理
  flutter_riverpod: ^2.5.1
  # 本地数据库
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  # 日历组件
  table_calendar: ^3.1.2
  # 富文本编辑器
  flutter_quill: ^11.5.0
  # 图片选择
  image_picker: ^1.1.2
  # 图表库
  fl_chart: ^0.68.0
  # 日期格式化
  intl: any
  # 图片压缩
  image: ^4.2.0
  # 系统分享（数据导出）
  share_plus: ^10.1.4
  sqflite_common_ffi_web: ^1.1.1
  sqflite_common: ^2.5.7
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true